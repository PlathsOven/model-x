# ModelX contract config — read by run_live.py.
# Add or remove contracts by editing this file.
# phase_duration_seconds is global (optional — falls back to $PHASE_DURATION_SECONDS).

contracts:
  - id: sp500-hourly
    name: "S&P 500 close price on 10th April 2026"
    description: "What will the S&P 500 close at on 10th April 2026?"
    search_terms:
      - "S&P 500"
      - "US stock market"
      - "Wall Street"
    price_ticker: "^GSPC"
    multiplier: 0.01
    position_limit: 100
    max_size: 50
    settlement_date: "2026-04-10 16:00:00T-04:00"
    news_sources:
      - reuters.com
      - cnbc.com
      - bloomberg.com
      - ft.com
      - wsj.com
      - bbc.com
    max_headlines_per_cycle: 10

  - id: wti-oil-apr12
    name: "WTI crude oil price at midnight April 12th 2026"
    description: "What will the WTI crude oil price be at 00:00:00 UTC on April 12th 2026?"
    search_terms:
      - "WTI crude oil"
      - "oil price"
      - "crude oil"
      - "NYMEX"
    price_ticker: "CL=F"
    multiplier: 0.01
    position_limit: 100
    max_size: 50
    settlement_date: "2026-04-12 00:00:00T+00:00"
    news_sources:
      - reuters.com
      - cnbc.com
      - bloomberg.com
      - ft.com
      - wsj.com
      - bbc.com
    max_headlines_per_cycle: 10
