# ModelX participant config — read by run_live.py.
# Add or remove agents by editing this file. The script has no hardcoded names.
#
# Each model value is an OpenRouter model id routed through OpenRouterAgent.
# (requires OPENROUTER_API_KEY in your environment).
#
# Optional `max_tokens:` per agent overrides the output-token budget. Default
# is OpenRouterAgent.DEFAULT_MAX_TOKENS (4096). Reasoning models
# (nemotron-nano, glm-air, deepseek-r1, …) need this raised so they don't
# exhaust the budget on thinking tokens and return content=null.

agents:
  # - name: step-3.5-flash-mm
  #   model: stepfun/step-3.5-flash:free
  #   role: MM

  # - name: step-3.5-flash-hf
  #   model: stepfun/step-3.5-flash:free
  #   role: HF

  # - name: nemotron-3-super-120b-a12b-mm
  #   model: nvidia/nemotron-3-super-120b-a12b:free
  #   role: MM

  # - name: nemotron-3-super-120b-a12b-hf
  #   model: nvidia/nemotron-3-super-120b-a12b:free
  #   role: HF

  - name: nemotron-3-nano-30b-a3b-mm
    model: nvidia/nemotron-3-nano-30b-a3b:free
    role: MM
    max_tokens: 8192

  - name: nemotron-3-nano-30b-a3b-hf
    model: nvidia/nemotron-3-nano-30b-a3b:free
    role: HF
    max_tokens: 8192

  - name: glm-4.5-air-mm
    model: z-ai/glm-4.5-air:free
    role: MM
    max_tokens: 8192

  - name: glm-4.5-air-hf
    model: z-ai/glm-4.5-air:free
    role: HF
    max_tokens: 8192

  - name: elephant-alpha-mm
    model: openrouter/elephant-alpha
    role: MM
    max_tokens: 8192

  - name: elephant-alpha-hf
    model: openrouter/elephant-alpha
    role: HF
    max_tokens: 8192

  - name: gpt-oss-120b-mm
    model: openai/gpt-oss-120b:free
    role: MM
    max_tokens: 8192

  - name: gpt-oss-120b-hf
    model: openai/gpt-oss-120b:free
    role: HF
    max_tokens: 8192